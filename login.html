<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskMaster Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">
  <div class="auth-background">
    <div class="noise"></div>
    <div class="stars" id="stars"></div>
  </div>

  <main class="auth-layout auth-login-layout">
    <a class="auth-back-home" href="index.html">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 19L5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Back Home</span>
    </a>

    <p class="auth-kicker">Your productivity companion</p>

    <section class="auth-card login-card" aria-labelledby="login-title">
      <h1 id="login-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue your streak</p>

      <form class="auth-form" id="login-form">
        <label class="auth-field">
          <span>Email</span>
          <input type="email" name="email" placeholder="you@university.edu" required>
        </label>

        <label class="auth-field">
          <span class="auth-field-row">
            <span>Password</span>
            <a class="auth-link" href="#">Forgot?</a>
          </span>
          <input type="password" name="password" placeholder="........" required>
        </label>

        <button class="auth-submit" type="submit">
          <span>Sign In</span>
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M12 5L19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <p class="auth-message" id="login-message" aria-live="polite"></p>
      </form>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
